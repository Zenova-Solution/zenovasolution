    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      document.documentElement.setAttribute('data-theme',
        (function() { try { var t = localStorage.getItem('zenova-theme'); if (t === 'dark' || t === 'light') return t; } catch(e){} return 'dark'; })()
      );
