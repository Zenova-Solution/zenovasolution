name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zenova_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/zenova_test
      DATABASE_URL_SYNC: postgresql+asyncpg://postgres:postgres@localhost:5432/zenova_test
      JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET || 'ci-test-secret-must-be-32-chars-long-for-safety' }}
      JWT_ALGORITHM: HS256
      APP_ENV: testing
      APP_DEBUG: false
      CORS_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Run Ruff
        run: ruff check app

      - name: Run MyPy
        run: mypy app

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing
